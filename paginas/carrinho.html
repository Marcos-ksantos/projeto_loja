<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/carrinho.css">
  <script src="../js/carrinho.js" defer></script>

  <title>Document</title>
</head>

<body>
  <header>
    <h1>DREZZ - Carrinho</h1>
  </header>

  <section id="carrinho">
    <section id="itens-carrinho">
      <section id="itens">
        <div class="img-itens">

          <img src="../imagens/camisa (10).png" alt="camisa 10">

        </div>
        <div id="descricoes-itens">
          <div class="descricao">
            Guarda Roupa 1
          </div>
          <div class="valores">
            <p>R$ 45,00</p>
          <div class="input-quantidade">
            <input type="number" name="quant1" id="quant 01" class="input-item" value="1">
            </div>
          </div>
        </div>
      </section>
    </section>
    <div id="valores-carrinho">
      <div id="div-cep">
        <h2 class="titulos-valores-carrinho">Total a pagar</h2>
        <p id="valor-Pagar" class="valor">R$ 100,00</p>
      </div>
    </div>
    <button id="btn-continuar" class="btn-carrinho">Continuar Compra</button>
    <button id="btn-finalizar" class="btn-carrinho">Finalizar Compra</button>
  </section>

  <button>Finalizar Compra</button>
  </div>

  </div>

  </main>
