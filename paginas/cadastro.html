<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="/css/style_cadastro.css">
    <script src="js/script.js" defer></script>

    <title>Document</title>
</head>

<body>

    <main id="geral">
         
        <header id="cabecalho">
           <div id="logo">
                <strong>DREZZ</strong>
            </div>

            <nav id="menu">
            </nav>

        </header>

        <section id="form-sec">

            <form id="form">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="tipo-1" maxlength="60" placeholder="Informe seu Nome" required>

                <label for="sobrenome">Sobrenome</label>
                <input type="text" name="sobrenome" id="sobrenome" class="tipo-1" maxlength="60"
                    placeholder="Informe seu Sobrenome" required>
               
                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" class="tipo-2" maxlength="11" placeholder="Informe seu CPF" required>
               
                <label for="telefone">Telefone</label>
                <input type="text" name="telefone" id="telefone" class="tipo-2" maxlength="60"
                    placeholder="Informe seu Telefone" required>

                <label for="email">Email</label>
                <input type="text" name="email" id="email" class="tipo-1" maxlength="60" placeholder="Informe seu Email" required>

                <label for="data">Data de Nascimento</label>
                <input type="date" name="data" id="data" class="tipo-3" maxlength="60"
                    placeholder="Informe sua Data de Nascimento" required>
               
                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" class="tipo-3" maxlength="8" placeholder="Informe seu CEP" required>
               
                <label for="logradouro">Logradóuro</label>
                <input type="text" name="logradouro" id="logradouro" class="tipo-1" maxlength="60"
                    placeholder="Informe seu Logradóuro" required>
               
                <label for="numero">Número de Endereço</label>
                <input type="text" name="numero" id="numero" class="tipo-3" maxlength="60"
                    placeholder="Informe seu Numero de Endereço" required>
               
                <label for="complemento">Complemento</label>
                <input type="text" name="complemento" id="complemento" class="tipo-1" maxlength="60"
                    placeholder="Informe seu Complemento" required>
               
                <label for="bairro">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="tipo-1" maxlength="60"
                    placeholder="Informe seu Bairro" required>
               
                <label for="cidade">Cidade</label>
                <input type="text" name="cidade" id="cidade" class="tipo-1" maxlength="60"
                    placeholder="Informe sua Cidade" required>
               
                <label for="Estado">Estado</label>
                <select name="estado" id="estado" class="input-vlr02"placeholder="Informe seu Estado"required> 
                    <option>Escolha seu Estado</option>
                    <option value="Al">Alagoas</option>
                    <option value="Ba">Bahia</option>
                    <option value="Ce">Ceará</option>
                    <option value="Ma">Maranhão</option>
                    <option value="Pb">Paraíba</option>
                    <option value="Pe">Pernambuco</option>
                    <option value="Pi">Piauí</option>
                </select>
                    
               
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="tipo-3" maxlength="8" placeholder="Informe sua Senha" required>
               
                <label for="confirm"></label>
               Você deseja receber notificações?<input type="radio" name="confirm" id="confirm" >

               <div id="btn">
                <button type="submit"><a href="../index.html">Cadastrar</a></button>
                <button type="reset">Cancelar</button>
            </div>
            </form>
        </section>
    </main>

</body>

</html>
